<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Livinha - Controle de despesas</title>
  <link rel="manifest" href="./manifest.webmanifest?v=20260520-password-gate" />
  <link rel="stylesheet" href="./styles.css?v=20260520-password-gate" />
  <style>
    .brand-emblem,.login-emblem{display:none!important}
    .auth-gate{min-height:100vh;display:grid;place-items:center;padding:24px;background:#fff;color:#2f1d08;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .auth-card{width:min(420px,100%);border:1px solid #e0d0ba;border-radius:8px;background:#fff;padding:28px;box-shadow:0 18px 44px rgba(47,29,8,.08)}
    .auth-card h1{margin:0 0 8px;font-size:24px;line-height:1.2}.auth-card p{margin:0 0 18px;color:#70522c;line-height:1.5}.auth-card button,.auth-card input{font:inherit}
    .auth-mode-switch{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:4px;margin-bottom:16px;border:1px solid #e0d0ba;border-radius:8px;background:#f7f3ed}
    .auth-mode-switch button{border:0;border-radius:6px;padding:8px 6px;background:transparent;color:#70522c;cursor:pointer}.auth-mode-switch button.active{background:#7a4900;color:#fff;font-weight:700}
    .auth-field{display:grid;gap:6px;margin-bottom:12px}.auth-field label{font-size:12px;color:#70522c;font-weight:700}.auth-field input{width:100%;min-height:42px;border:1px solid #d7c5aa;border-radius:7px;padding:9px 11px;color:#2f1d08;background:#fff}
    .auth-submit{width:100%;min-height:42px;border:0;border-radius:7px;background:#7a4900;color:#fff;font-weight:700;cursor:pointer}.auth-submit:disabled{opacity:.6;cursor:wait}
    .auth-message{margin-top:14px;padding:10px 12px;border-radius:7px;background:#f7f3ed;color:#70522c;font-size:13px;line-height:1.4}.auth-message.error{background:#fff1ee;color:#8b1e14}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL="https://bybobnokmfkuerqgzmtk.supabase.co";
    const SUPABASE_KEY="sb_publishable_doSkbX5MAGsHmcE11JTY6A_iqbnPJnM";
    const APP_SCRIPT="./static-app.js?v=20260520-password-gate";
    const REDIRECT_URL=window.location.href.split("#")[0];
    const root=document.getElementById("root");
    const client=window.supabase?.createClient(SUPABASE_URL,SUPABASE_KEY);
    let mode="signin",loading=false,message="",messageKind="",recovery=false,appStarted=false;

    function esc(value){return String(value||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}
    function title(){return recovery?"Definir nova senha":mode==="signup"?"Criar conta":mode==="recover"?"Recuperar senha":"Entrar"}
    function desc(){return recovery?"Digite uma nova senha para concluir a recuperação de acesso.":mode==="signup"?"Crie seu acesso com e-mail e senha. Pode ser necessário confirmar o e-mail.":mode==="recover"?"Enviaremos um link para você definir uma nova senha.":"Use seu e-mail e senha para acessar o controle de despesas."}

    function renderAuth(){
      const showPassword=mode!=="recover"||recovery;
      root.innerHTML=`<main class="auth-gate"><section class="auth-card"><h1>${title()}</h1><p>${desc()}</p>${recovery?"":`<div class="auth-mode-switch" role="tablist" aria-label="Modo de acesso"><button type="button" class="${mode==="signin"?"active":""}" data-auth-mode="signin">Entrar</button><button type="button" class="${mode==="signup"?"active":""}" data-auth-mode="signup">Criar conta</button><button type="button" class="${mode==="recover"?"active":""}" data-auth-mode="recover">Recuperar</button></div>`}<form id="auth-form">${recovery?"":`<div class="auth-field"><label for="auth-email">E-mail</label><input id="auth-email" type="email" autocomplete="email" required placeholder="seu@email.com" /></div>`}${showPassword?`<div class="auth-field"><label for="auth-password">Senha</label><input id="auth-password" type="password" autocomplete="${mode==="signin"?"current-password":"new-password"}" required minlength="6" placeholder="mínimo 6 caracteres" /></div>`:""}<button class="auth-submit" type="submit" ${loading||!client?"disabled":""}>${loading?"Processando...":title()}</button></form>${message?`<div class="auth-message ${messageKind}">${esc(message)}</div>`:""}</section></main>`;
      document.querySelector("#auth-email,#auth-password")?.focus();
    }

    function startApp(){
      if(appStarted)return;
      appStarted=true;
      root.innerHTML="";
      const script=document.createElement("script");
      script.src=APP_SCRIPT;
      script.defer=true;
      document.body.appendChild(script);
    }

    async function handleAuthSubmit(event){
      event.preventDefault();
      if(!client)return;
      const email=document.getElementById("auth-email")?.value.trim();
      const password=document.getElementById("auth-password")?.value;
      loading=true;message="";messageKind="";renderAuth();
      let result;
      if(recovery){
        result=await client.auth.updateUser({password});
        if(!result.error){message="Senha atualizada. Abrindo o app...";loading=false;renderAuth();startApp();return}
      }else if(mode==="recover"){
        result=await client.auth.resetPasswordForEmail(email,{redirectTo:REDIRECT_URL});
        if(!result.error)message="Link enviado. Abra seu e-mail para definir uma nova senha.";
      }else if(mode==="signup"){
        result=await client.auth.signUp({email,password,options:{emailRedirectTo:REDIRECT_URL}});
        if(!result.error)message="Conta criada. Se o Supabase pedir confirmação, abra o link enviado por e-mail.";
      }else{
        result=await client.auth.signInWithPassword({email,password});
        if(!result.error){startApp();return}
      }
      if(result?.error){message=result.error.message;messageKind="error"}
      loading=false;renderAuth();
    }

    document.addEventListener("click",event=>{
      const button=event.target.closest("[data-auth-mode]");
      if(!button)return;
      mode=button.dataset.authMode;message="";messageKind="";renderAuth();
    });
    document.addEventListener("submit",event=>{if(event.target?.id==="auth-form")handleAuthSubmit(event)});

    async function bootGate(){
      if(!client){message="Supabase indisponível. Recarregue a página.";messageKind="error";renderAuth();return}
      client.auth.onAuthStateChange((event,session)=>{
        if(event==="PASSWORD_RECOVERY"){recovery=true;renderAuth();return}
        if(event==="SIGNED_OUT"&&appStarted)window.location.reload();
        if(session&&!recovery)startApp();
      });
      const {data}=await client.auth.getSession();
      if(data.session&&!recovery)startApp();else renderAuth();
    }
    bootGate();
  </script>
</body>
</html>
